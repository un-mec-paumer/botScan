services:
  bot:
    container_name: bot-scan
    image: bot-scan:latest
    depends_on:
      - websearch
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    env_file:
      - .env
    volumes:
      - ./src:/app/src
    ports:
      - "3003:3003"
    
  websearch:
    container_name: websearch
    build:
      context: ./webSearch
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
